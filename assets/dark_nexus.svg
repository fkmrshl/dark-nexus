<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 374" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .bg { fill: #060001; }
      .terminal { fill: rgba(8,0,1,0.97); stroke: #dc143c; stroke-width: 1.5; animation: border-pulse 4s ease-in-out infinite, flicker 9s infinite, screen-jump 8s infinite; }
      @keyframes border-pulse { 0%,100% { filter: drop-shadow(0 0 4px rgba(220,20,60,.35)); } 50% { filter: drop-shadow(0 0 14px rgba(220,20,60,.6)); } }
      @keyframes flicker { 0%,91%{opacity:1} 92%{opacity:.86} 93%{opacity:1} 96%{opacity:.93} 100%{opacity:1} }
      @keyframes scan { 0%{transform: translateY(0)} 100%{transform: translateY(370px)} }
      @keyframes badge-glow { 0%,100% { filter: drop-shadow(0 0 2px rgba(220,20,60,.2)); } 50% { filter: drop-shadow(0 0 7px rgba(220,20,60,.5)); } }
      @keyframes txt-glow-kali { 0%,100% { text-shadow: 0 0 5px rgba(220,20,60,.45); } 50% { text-shadow: 0 0 10px rgba(220,20,60,.8); } }
      @keyframes txt-glow-ba { 0%,100% { text-shadow: 0 0 5px rgba(255,42,80,.45); } 50% { text-shadow: 0 0 10px rgba(255,42,80,.8); } }
      @keyframes glow-breathe { 0%,100%{opacity:.28} 50%{opacity:.44} }
      @keyframes neon-breathe { 0%,100% { filter: drop-shadow(0 0 3px #ff2040) drop-shadow(0 0 8px rgba(220,20,60,.4)); } 50% { filter: drop-shadow(0 0 5px #ff3050) drop-shadow(0 0 12px rgba(220,20,60,.6)); } }
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      @keyframes text-glitch-anim { 0%, 93%, 96%, 100% { transform: translate(0, 0); } 94% { transform: translate(-4px, 1px); } 95% { transform: translate(4px, -1px); } }
      @keyframes subtle-twitch { 0%, 96%, 98%, 100% { transform: translate(0,0); opacity: 1; } 97% { transform: translate(-2px, 0); opacity: 0.8; } }
      @keyframes screen-jump { 0%, 92%, 94%, 100% { transform: translateY(0); } 93% { transform: translateY(-1.5px); } }
      .st-mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .cr-mono { font-family: 'Courier New', monospace; }
      .titlebar { fill: rgba(20,0,4,0.9); }
      .title-border { stroke: #8b0020; stroke-width: 1; }
      .dot { fill: #1a0004; stroke: #3d0010; stroke-width: 1; }
      .badge-bg { fill: #0d0002; stroke: #3d0010; stroke-width: 1; animation: badge-glow 3s ease-in-out infinite; }
      .badge-bg.blackarch { animation-delay: 1.5s; }
      .badge-label { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; }
      .lbl-kali { fill: #dc143c; animation: txt-glow-kali 3s ease-in-out infinite; }
      .lbl-ba { fill: #ff2a50; animation: txt-glow-ba 3s ease-in-out infinite; animation-delay: 1.5s; }
      .sep { fill: #3d0010; font-size: 16px; font-weight: bold; }
      .banner-glow { fill: #ff0025; font-size: 11px; animation: glow-breathe 3s ease-in-out infinite; filter: blur(4px); }
      .banner-main { fill: #e01030; font-size: 11px; animation: neon-breathe 3s ease-in-out infinite, text-glitch-anim 6s infinite; }
      .divider { stroke: #8b0020; stroke-width: 1; opacity: 0.5; }
      .bullet-line { font-size: 11.5px; fill: #dc143c; letter-spacing: 0.5px; }
      .bl-1 { animation: subtle-twitch 4.2s infinite; }
      .bl-2 { animation: subtle-twitch 5.5s infinite; }
      .bl-3 { animation: subtle-twitch 3.8s infinite; }
      .bl-4 { animation: subtle-twitch 6.1s infinite; }
      .bullet-tag { fill: #ff2a50; font-weight: bold; text-shadow: 0 0 5px rgba(255,42,80,0.6); }
      .hl { fill: #ff2a50; }
      .tagline-wrap { font-size: 12px; letter-spacing: 5px; fill: #8b0020; text-transform: uppercase; }
      .tagline-bracket { fill: #3d000c; }
      .cursor { fill: #dc143c; animation: blink 1s step-end infinite; }
      .bottombar { fill: rgba(14,0,3,0.75); }
      .bb-text { font-size: 10px; fill: #b00028; letter-spacing: 0.8px; }
      .bb-hl { fill: #dc143c; }
      .bb-bar-bg { fill: #3d0010; }
      .scanline { fill: rgba(220,20,60,.03); animation: scan 6s linear infinite; }
    </style>
